<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aykan Kiray Realty | Daire ve Konumlar</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; --bg: #0a0e14; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Gizlilik Modu Stilleri */
        .admin-content { display: none; padding: 20px; }
        .is-logged-in .admin-content { display: block; }
        .is-logged-in .login-screen { display: none; }

        /* Login Ekranı */
        .login-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .lock-icon { font-size: 50px; margin-bottom: 20px; filter: grayscale(1); opacity: 0.3; }
        
        /* Header */
        .header { background: rgba(10,14,20,0.9); backdrop-filter: blur(15px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:1000; border-bottom: 1px solid var(--border); }
        .logo { font-weight: 700; letter-spacing: 1px; cursor: pointer; }
        .logo span { color: var(--accent); }

        /* Kartlar */
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; margin-bottom: 20px; border-left: 4px solid var(--accent); }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 15px; }
        .price { font-size: 22px; font-weight: 700; color: var(--accent); }
        .card-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .card-btns button { padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: #fff; font-size: 12px; font-weight: 600; }
        .share-btn { grid-column: span 2; background: #25d366 !important; color: #000 !important; border: none !important; font-size: 14px !important; font-weight: 800 !important; }

        /* Form / Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; overflow-y: auto; }
        .input-box { background: var(--glass); border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: #fff; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; font-size: 16px; }
        #preview-map { height: 150px; border-radius: 15px; margin-bottom: 10px; border: 1px solid var(--border); }
        .save-btn { width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: 15px; font-weight: 800; color: #000; font-size: 16px; margin-top: 10px; }
        
        /* PIN Ekranı */
        #pinOverlay { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
        .pin-input { background: none; border: none; border-bottom: 2px solid var(--accent); color: var(--accent); font-size: 40px; text-align: center; width: 160px; outline: none; letter-spacing: 8px; }

        .add-fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--accent); border-radius: 20px; color: #000; font-size: 30px; border: none; box-shadow: 0 10px 30px rgba(0,242,255,0.3); z-index: 999; }
    </style>
</head>
<body id="appBody">

    <div class="login-screen" id="loginScreen">
        <div class="lock-icon">🔒</div>
        <div class="logo" id="secretTrigger">AYKAN KIRAY <span>REALTY</span></div>
        <p style="opacity:0.4; font-size: 12px; margin-top: 20px;">Daire Yönetim Paneli</p>
    </div>

    <div id="pinOverlay">
        <input type="password" id="pinField" class="pin-input" maxlength="4" placeholder="****" oninput="verifyPin(this.value)">
        <p style="color: #444; margin-top: 20px;">Giriş Anahtarını Yaz</p>
    </div>

    <div class="admin-content">
        <header class="header">
            <div class="logo">AYKAN KIRAY <span>REALTY</span></div>
            <button onclick="logout()" style="background:none; border:none; color:gray; font-size:12px;">Güvenli Çıkış</button>
        </header>

        <div id="app-list" style="margin-top:20px;"></div>
        
        <button class="add-fab" onclick="openForm()">+</button>
    </div>

    <div id="itemModal" class="modal">
        <h2 style="margin-top:0">Mülk Kaydet</h2>
        <input type="hidden" id="edit-id" value="-1">
        
        <div id="upload-box" style="height:120px; border:2px dashed #333; border-radius:15px; display:flex; align-items:center; justify-content:center; margin-bottom:15px; overflow:hidden;" onclick="document.getElementById('file-in').click()">
            <input type="file" id="file-in" hidden accept="image/*" onchange="handleImage(this)">
            <img id="preview-img" style="display:none; width:100%; height:100%; object-fit:cover;">
            <span id="upload-hint">📸 Fotoğraf Ekle</span>
        </div>

        <input type="text" id="in-title" placeholder="İlan Başlığı" class="input-box">
        <div style="display:flex; gap:10px">
            <input type="number" id="in-price" placeholder="Fiyat (₺)" class="input-box">
            <input type="number" id="in-area" placeholder="m²" class="input-box">
        </div>
        <input type="text" id="in-rooms" placeholder="Oda (Örn: 3+1)" class="input-box">
        
        <div id="preview-map"></div>
        <button onclick="fetchGPS()" style="width:100%; padding:10px; background:none; border:1px solid var(--accent); color:var(--accent); border-radius:10px; margin-bottom:10px;">📍 Konumu Al</button>
        
        <div style="display:none">
            <input type="number" step="any" id="in-lat">
            <input type="number" step="any" id="in-lon">
        </div>

        <select id="in-status" class="input-box">
            <option value="Satılık">Satılık</option>
            <option value="Kiralık">Kiralık</option>
        </select>

        <button class="save-btn" onclick="pushToCloud()">BULUTA KAYDET</button>
        <button onclick="closeForm()" style="width:100%; background:none; border:none; color:red; margin-top:20px;">İptal</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        // --- KONFİGÜRASYON ---
        const firebaseConfig = {
            apiKey: "AIzaSyC991-RPWUC49t09yHqPrGhhvcMZKYTdhU",
            authDomain: "aykankirayrealty.firebaseapp.com",
            databaseURL: "https://aykankirayrealty-default-rtdb.firebaseio.com",
            projectId: "aykankirayrealty",
            storageBucket: "aykankirayrealty.firebasestorage.app",
            messagingSenderId: "625916623720",
            appId: "1:625916623720:web:3470dce7c7538f014af4dd"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let activePhoto = "";
        let map, marker;
        const MY_PIN = "1925"; // Sadece senin bildiğin şifre

        // --- GİZLİ GİRİŞ MANTIĞI ---
        let timer;
        const trigger = document.getElementById('secretTrigger');
        trigger.addEventListener('mousedown', startTimer);
        trigger.addEventListener('touchstart', startTimer);
        trigger.addEventListener('mouseup', endTimer);
        trigger.addEventListener('touchend', endTimer);

        function startTimer() { timer = setTimeout(() => { document.getElementById('pinOverlay').style.display = 'flex'; }, 2000); }
        function endTimer() { clearTimeout(timer); }

        function verifyPin(val) {
            if(val === MY_PIN) {
                document.getElementById('appBody').classList.add('is-logged-in');
                document.getElementById('pinOverlay').style.display = 'none';
                sessionStorage.setItem('isAuth', 'true');
                loadData();
            }
        }

        function logout() { sessionStorage.clear(); window.location.reload(); }
        if(sessionStorage.getItem('isAuth')) { document.getElementById('appBody').classList.add('is-logged-in'); loadData(); }

        // --- VERİ İŞLEMLERİ ---
        function loadData() {
            db.ref('ilanlar').on('value', snap => {
                const data = snap.val();
                const list = [];
                for(let id in data) list.push({id, ...data[id]});
                render(list.reverse());
            });
        }

        function render(items) {
            const container = document.getElementById('app-list');
            container.innerHTML = items.length ? "" : "<p style='text-align:center; opacity:0.3;'>Portföy henüz boş.</p>";
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <img src="${item.photo}" class="card-img">
                    <div class="card-body">
                        <div class="price">${Number(item.price).toLocaleString('tr-TR')} ₺</div>
                        <h2 style="margin:5px 0; font-size:18px;">${item.name}</h2>
                        <p style="color:gray; font-size:12px;">${item.rooms} • ${item.area} • ${item.status}</p>
                        <div class="card-btns">
                            <button class="share-btn" onclick="sendWhatsApp('${item.id}')">WhatsApp Paylaş</button>
                            <button onclick="editItem('${item.id}')">⚙️ Düzenle</button>
                            <button onclick="removeItem('${item.id}')" style="color:red">🗑️ Sil</button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function pushToCloud() {
            const id = document.getElementById('edit-id').value;
            const payload = {
                name: document.getElementById('in-title').value,
                price: document.getElementById('in-price').value,
                area: document.getElementById('in-area').value + " m²",
                rooms: document.getElementById('in-rooms').value,
                lat: document.getElementById('in-lat').value,
                lon: document.getElementById('in-lon').value,
                status: document.getElementById('in-status').value,
                photo: activePhoto
            };
            
            if(id === "-1") db.ref('ilanlar').push(payload);
            else db.ref('ilanlar/'+id).update(payload);
            closeForm();
        }

        // --- YARDIMCI ARAÇLAR ---
        function fetchGPS() {
            navigator.geolocation.getCurrentPosition(p => {
                const lat = p.coords.latitude;
                const lon = p.coords.longitude;
                document.getElementById('in-lat').value = lat;
                document.getElementById('in-lon').value = lon;
                
                if(!map) {
                    map = L.map('preview-map', {zoomControl:false}).setView([lat, lon], 15);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                }
                map.setView([lat, lon], 15);
                if(marker) map.removeLayer(marker);
                marker = L.marker([lat, lon]).addTo(map);
            });
        }

        function handleImage(input) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const scale = 800 / img.width;
                    canvas.width = 800; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    activePhoto = canvas.toDataURL("image/webp", 0.6);
                    document.getElementById('preview-img').src = activePhoto;
                    document.getElementById('preview-img').style.display = 'block';
                    document.getElementById('upload-hint').style.display = 'none';
                }
            };
            reader.readAsDataURL(input.files[0]);
        }

        function sendWhatsApp(id) {
            db.ref('ilanlar/'+id).once('value', s => {
                const i = s.val();
                const mapLink = `https://www.google.com/maps?q=${i.lat},${i.lon}`;
                const text = `🏠 *${i.name}*\n💰 *Fiyat:* ${Number(i.price).toLocaleString('tr-TR')} ₺\n📐 *Alan:* ${i.area}\n🔢 *Oda:* ${i.rooms}\n📍 *Konum:* ${mapLink}`;
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
            });
        }

        function openForm() { document.getElementById('itemModal').style.display = 'block'; }
        function closeForm() { 
            document.getElementById('itemModal').style.display = 'none'; 
            document.getElementById('edit-id').value = "-1";
            activePhoto = "";
            document.getElementById('preview-img').style.display='none';
            document.getElementById('upload-hint').style.display='block';
            document.querySelectorAll('.input-box').forEach(i => i.value="");
        }

        function removeItem(id) { if(confirm("Kalıcı olarak silinsin mi?")) db.ref('ilanlar/'+id).remove(); }
        
        function editItem(id) {
            db.ref('ilanlar/'+id).once('value', s => {
                const i = s.val();
                document.getElementById('edit-id').value = id;
                document.getElementById('in-title').value = i.name;
                document.getElementById('in-price').value = i.price;
                document.getElementById('in-area').value = i.area.replace(" m²", "");
                document.getElementById('in-rooms').value = i.rooms;
                document.getElementById('in-lat').value = i.lat;
                document.getElementById('in-lon').value = i.lon;
                activePhoto = i.photo;
                document.getElementById('preview-img').src = i.photo;
                document.getElementById('preview-img').style.display = 'block';
                document.getElementById('upload-hint').style.display = 'none';
                openForm();
            });
        }
    </script>
</body>
</html>
