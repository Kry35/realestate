<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aykan Kıray Realty| Lokasyon Odaklı</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; --bg: #0a0e14; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; margin: 0; }
        
        .admin-content { display: none; padding: 20px; }
        .is-logged-in .admin-content { display: block; }
        .is-logged-in .login-screen { display: none; }

        .login-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo { font-weight: 700; cursor: pointer; font-size: 24px; }
        .logo span { color: var(--accent); }

        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; margin-bottom: 25px; }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 18px; }
        .price { font-size: 24px; font-weight: 700; color: var(--accent); margin-bottom: 5px; }
        
        /* Konum ve Paylaşım Butonları */
        .card-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-nav { grid-column: span 2; background: #4285F4 !important; color: white !important; font-weight: 700; border: none !important; }
        .btn-wa { grid-column: span 2; background: #25d366 !important; color: #000 !important; font-weight: 800; border: none !important; }
        .card-btns button { padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: #fff; font-size: 14px; cursor: pointer; }

        /* Form */
        .modal { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; padding: 20px; overflow-y: auto; }
        .input-box { background: var(--glass); border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: #fff; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        #preview-map { height: 180px; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--accent); }
        .save-btn { width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: 15px; font-weight: 800; color: #000; font-size: 16px; }
        
        #pinOverlay { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
        .pin-input { background: none; border: none; border-bottom: 2px solid var(--accent); color: var(--accent); font-size: 40px; text-align: center; width: 160px; outline: none; letter-spacing: 8px; }
        .add-fab { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: var(--accent); border-radius: 22px; color: #000; font-size: 35px; border: none; z-index: 999; font-weight: bold; }
    </style>
</head>
<body id="appBody">

    <div class="login-screen" id="loginScreen">
        <div class="logo" id="secretTrigger">AYKAN KIRAY <span>REALTY</span></div>
        <p style="opacity:0.3; margin-top:20px; font-size:12px;">Basılı Tut ve Kilidi Aç</p>
    </div>

    <div id="pinOverlay">
        <input type="password" id="pinField" class="pin-input" maxlength="4" oninput="verifyPin(this.value)">
        <p style="color: #444; margin-top: 20px;">Giriş Şifresi</p>
    </div>

    <div class="admin-content">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div class="logo">AK <span>PRO</span></div>
            <button onclick="logout()" style="background:none; border:none; color:red;">Çıkış</button>
        </header>
        <div id="app-list"></div>
        <button class="add-fab" onclick="openForm()">+</button>
    </div>

    <div id="itemModal" class="modal">
        <h2 style="margin-bottom:20px">Yeni Portföy</h2>
        <input type="hidden" id="edit-id" value="-1">
        
        <div id="upload-box" style="height:150px; border:2px dashed #333; border-radius:15px; display:flex; align-items:center; justify-content:center; margin-bottom:15px; overflow:hidden;" onclick="document.getElementById('file-in').click()">
            <input type="file" id="file-in" hidden accept="image/*" onchange="handleImage(this)">
            <img id="preview-img" style="display:none; width:100%; height:100%; object-fit:cover;">
            <span id="upload-hint">📸 Fotoğraf Ekle</span>
        </div>

        <input type="text" id="in-title" placeholder="Başlık" class="input-box">
        <div style="display:flex; gap:10px">
            <input type="number" id="in-price" placeholder="Fiyat (₺)" class="input-box">
            <input type="text" id="in-rooms" placeholder="Oda" class="input-box">
        </div>
        
        <div id="preview-map"></div>
        <button onclick="fetchGPS()" style="width:100%; padding:15px; background:#fff; color:#000; border-radius:12px; font-weight:bold; margin-bottom:15px; border:none;">📍 ŞU ANKİ KONUMU YAKALA</button>
        
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input type="number" step="any" id="in-lat" placeholder="Enlem" class="input-box">
            <input type="number" step="any" id="in-lon" placeholder="Boylam" class="input-box">
        </div>

        <button class="save-btn" onclick="pushToCloud()">BULUTA KAYDET</button>
        <button onclick="closeForm()" style="width:100%; background:none; border:none; color:gray; margin-top:20px;">Kapat</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC991-RPWUC49t09yHqPrGhhvcMZKYTdhU",
            authDomain: "aykankirayrealty.firebaseapp.com",
            databaseURL: "https://aykankirayrealty-default-rtdb.firebaseio.com",
            projectId: "aykankirayrealty",
            storageBucket: "aykankirayrealty.firebasestorage.app",
            messagingSenderId: "625916623720",
            appId: "1:625916623720:web:3470dce7c7538f014af4dd"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let activePhoto = "";
        let map, marker;

        // PIN MANTIĞI
        let timer;
        const trigger = document.getElementById('secretTrigger');
        const start = () => timer = setTimeout(() => document.getElementById('pinOverlay').style.display='flex', 2000);
        const end = () => clearTimeout(timer);
        trigger.onmousedown = start; trigger.ontouchstart = start;
        trigger.onmouseup = end; trigger.ontouchend = end;

        function verifyPin(v) {
            if(v === "1925") {
                document.getElementById('appBody').classList.add('is-logged-in');
                document.getElementById('pinOverlay').style.display='none';
                sessionStorage.setItem('auth', '1');
                load();
            }
        }
        if(sessionStorage.getItem('auth')) { document.getElementById('appBody').classList.add('is-logged-in'); load(); }
        function logout() { sessionStorage.clear(); location.reload(); }

        function load() {
            db.ref('ilanlar').on('value', s => {
                const list = [];
                s.forEach(child => { list.push({id: child.key, ...child.val()}); });
                render(list.reverse());
            });
        }

        function render(items) {
            const container = document.getElementById('app-list');
            container.innerHTML = "";
            items.forEach(i => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <img src="${i.photo}" class="card-img">
                    <div class="card-body">
                        <div class="price">${Number(i.price).toLocaleString('tr-TR')} ₺</div>
                        <h2 style="margin:0 0 10px 0; font-size:18px;">${i.name}</h2>
                        <div class="card-btns">
                            <button class="btn-nav" onclick="window.open('https://www.google.com/maps?q=${i.lat},${i.lon}')">🌐 HARİTADA GÖR (NAVİGASYON)</button>
                            <button class="btn-wa" onclick="sendWA('${i.id}')">WHATSAPP PAYLAŞ</button>
                            <button onclick="editItem('${i.id}')">⚙️ Düzenle</button>
                            <button onclick="removeItem('${i.id}')" style="color:red">🗑️ Sil</button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function fetchGPS() {
            navigator.geolocation.getCurrentPosition(p => {
                const lat = p.coords.latitude; const lon = p.coords.longitude;
                document.getElementById('in-lat').value = lat;
                document.getElementById('in-lon').value = lon;
                if(!map) {
                    map = L.map('preview-map', {zoomControl:false}).setView([lat, lon], 15);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                }
                map.setView([lat, lon], 15);
                if(marker) map.removeLayer(marker);
                marker = L.marker([lat, lon]).addTo(map);
            });
        }

        function pushToCloud() {
            const id = document.getElementById('edit-id').value;
            const data = {
                name: document.getElementById('in-title').value,
                price: document.getElementById('in-price').value,
                rooms: document.getElementById('in-rooms').value,
                lat: document.getElementById('in-lat').value,
                lon: document.getElementById('in-lon').value,
                photo: activePhoto
            };
            if(id === "-1") db.ref('ilanlar').push(data);
            else db.ref('ilanlar/'+id).update(data);
            closeForm();
        }

        function sendWA(id) {
            db.ref('ilanlar/'+id).once('value', s => {
                const i = s.val();
                const link = `https://www.google.com/maps?q=${i.lat},${i.lon}`;
                const text = `🏠 *${i.name}*\n💰 *Fiyat:* ${Number(i.price).toLocaleString('tr-TR')} ₺\n📍 *Konum:* ${link}`;
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
            });
        }

        function handleImage(input) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const scale = 800 / img.width;
                    canvas.width = 800; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    activePhoto = canvas.toDataURL("image/webp", 0.6);
                    document.getElementById('preview-img').src = activePhoto;
                    document.getElementById('preview-img').style.display='block';
                    document.getElementById('upload-hint').style.display='none';
                }
            };
            reader.readAsDataURL(input.files[0]);
        }

        function openForm() { document.getElementById('itemModal').style.display='block'; }
        function closeForm() { document.getElementById('itemModal').style.display='none'; document.getElementById('edit-id').value="-1"; }
        function removeItem(id) { if(confirm("Silinsin mi?")) db.ref('ilanlar/'+id).remove(); }
        function editItem(id) {
            db.ref('ilanlar/'+id).once('value', s => {
                const i = s.val();
                document.getElementById('edit-id').value = id;
                document.getElementById('in-title').value = i.name;
                document.getElementById('in-price').value = i.price;
                document.getElementById('in-rooms').value = i.rooms;
                document.getElementById('in-lat').value = i.lat;
                document.getElementById('in-lon').value = i.lon;
                activePhoto = i.photo;
                document.getElementById('preview-img').src = i.photo;
                document.getElementById('preview-img').style.display='block';
                document.getElementById('upload-hint').style.display='none';
                openForm();
            });
        }
    </script>
</body>
</html>
